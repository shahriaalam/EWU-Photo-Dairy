name: Generate Photo List

on:
  push:
    paths:
      - 'images/**'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate photos.js from folder structure
        run: |
          python3 << 'EOF'
          import os, json, re

          IMAGE_EXTS = {'.jpg', '.jpeg', '.png', '.gif', '.webp', '.PNG', '.JPG', '.JPEG'}

          SECTION_ORDER = [
              "Our Family",
              "Semester 2", "Semester 3", "Semester 4", "Semester 5",
              "Semester 6", "Semester 7", "Semester 8", "Semester 9",
              "Semester 10", "Semester 11", "Semester 12",
              "Convocation", "Gibli Art", "Others"
          ]

          FOLDER_MAP = {
              "1st Semester": "Our Family",
              "2nd Semester": "Semester 2",
              "3rd Semester": "Semester 3",
              "4th Semester": "Semester 4",
              "5th Semester": "Semester 5",
              "6th Semester": "Semester 6",
              "7th Semester": "Semester 7",
              "8th Semester": "Semester 8",
              "9th Semester": "Semester 9",
              "10th Semester": "Semester 10",
              "11th Semester": "Semester 11",
              "12th Semester": "Semester 12",
              "Convocation": "Convocation",
              "Gibli Art": "Gibli Art",
              "Others": "Others",
              "Slide": None  # skip slideshow folder
          }

          def natural_sort_key(s):
              return [int(c) if c.isdigit() else c.lower() for c in re.split(r'(\d+)', s)]

          sections = {name: [] for name in SECTION_ORDER}

          images_root = "images"
          if os.path.exists(images_root):
              for folder in sorted(os.listdir(images_root)):
                  folder_path = os.path.join(images_root, folder)
                  if not os.path.isdir(folder_path):
                      continue
                  section_name = FOLDER_MAP.get(folder)
                  if section_name is None:
                      continue
                  files = sorted(
                      [f for f in os.listdir(folder_path) if os.path.splitext(f)[1] in IMAGE_EXTS],
                      key=natural_sort_key
                  )
                  for fname in files:
                      src = f"images/{folder}/{fname}"
                      sections[section_name].append({"src": src, "text": section_name})

          output = []
          for name in SECTION_ORDER:
              output.append({"name": name, "photos": sections[name]})

          js = "// AUTO-GENERATED by GitHub Actions — do not edit manually\n"
          js += "const SECTIONS = " + json.dumps(output, indent=2) + ";\n"

          with open("photos.js", "w") as f:
              f.write(js)

          total = sum(len(s["photos"]) for s in output)
          print(f"Generated photos.js with {total} photos across {len(output)} sections")
          EOF

      - name: Commit photos.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add photos.js
          git diff --staged --quiet || git commit -m "chore: auto-update photos.js [skip ci]"
          git push
