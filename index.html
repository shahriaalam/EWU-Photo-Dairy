<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EWU Photo Diary — নষ্ট Gang</title>
  <link rel="stylesheet" href="style.css">
  <!-- photos.js is auto-generated by GitHub Actions -->
  <script src="photos.js" onerror="console.warn('photos.js not found, using fallback')"></script>
  <script defer src="script.js"></script>
</head>
<body>

  <!-- ── Login Screen ── -->
  <div id="login-screen">
    <div id="slideshow-container">
      <div class="mySlides"><img src="images/Slide/S0.jpg" alt=""></div>
      <div class="mySlides"><img src="images/Slide/S1.jpg" alt=""></div>
      <div class="mySlides"><img src="images/Slide/S2.jpg" alt=""></div>
      <div class="mySlides"><img src="images/Slide/S3.jpg" alt=""></div>
      <div class="mySlides"><img src="images/Slide/S4.jpeg" alt=""></div>
      <div class="mySlides"><img src="images/Slide/S5.jpg" alt=""></div>
      <div class="mySlides"><img src="images/Slide/S6.jpeg" alt=""></div>
      <div class="mySlides"><img src="images/Slide/S7.jpg" alt=""></div>
      <div class="mySlides"><img src="images/Slide/S8.jpg" alt=""></div>
      <div class="mySlides"><img src="images/Slide/S9.jpeg" alt=""></div>
    </div>

    <div id="login-container">
      <h2>Enter Password to Access The World of Magical Memories ❤️</h2>
      <input type="password" id="password" placeholder="Password">
      <button id="login-btn">Enter</button>
      <p id="error-message"></p>
    </div>
  </div>

  <!-- ── Gallery ── -->
  <div id="gallery" class="hidden">

    <!-- Hero -->
    <div class="gallery-hero">
      <h1>Amra Sobai নষ্ট Gang's Photo Diary</h1>
      <p>Fall 2021 &nbsp;·&nbsp; East West University</p>
      <div class="hero-line"></div>
    </div>

    <!-- Sticky semester navigation -->
    <div class="semester-filter">
      <button data-index="0"  onclick="scrollToSection('section-1')">Our Family</button>
      <button data-index="1"  onclick="scrollToSection('section-2')">Semester 2</button>
      <button data-index="2"  onclick="scrollToSection('section-3')">Semester 3</button>
      <button data-index="3"  onclick="scrollToSection('section-4')">Semester 4</button>
      <button data-index="4"  onclick="scrollToSection('section-5')">Semester 5</button>
      <button data-index="5"  onclick="scrollToSection('section-6')">Semester 6</button>
      <button data-index="6"  onclick="scrollToSection('section-7')">Semester 7</button>
      <button data-index="7"  onclick="scrollToSection('section-8')">Semester 8</button>
      <button data-index="8"  onclick="scrollToSection('section-9')">Semester 9</button>
      <button data-index="9"  onclick="scrollToSection('section-10')">Semester 10</button>
      <button data-index="10" onclick="scrollToSection('section-11')">Semester 11</button>
      <button data-index="11" onclick="scrollToSection('section-12')">Semester 12</button>
      <button data-index="12" onclick="scrollToSection('section-13')">Convocation</button>
      <button data-index="13" onclick="scrollToSection('section-14')">Ghibli Art</button>
      <button data-index="14" onclick="scrollToSection('section-15')">Others</button>
    </div>

    <!-- Photo sections rendered by JS -->
    <div id="photo-gallery"></div>

  </div>

  <!-- ── Lightbox ── -->
  <div id="lightbox" class="hidden">
    <span class="close" onclick="closeLightbox()">&times;</span>
    <button class="lightbox-nav" onclick="navigateLightbox(-1)" aria-label="Previous">&#10094;</button>
    <div class="lightbox-content">
      <img id="lightbox-img" src="" alt="">
      <p id="lb-counter"></p>
      <p id="lightbox-text"></p>
    </div>
    <button class="lightbox-nav" onclick="navigateLightbox(1)" aria-label="Next">&#10095;</button>
  </div>

  <!-- ── Audio ── -->
  <audio id="bg-music" loop>
    <source src="BG.mp3" type="audio/mpeg">
  </audio>
  <button id="music-btn" onclick="toggleMusic()" title="Toggle Music">🎵</button>

  <!-- ── Back to top ── -->
  <button id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top">↑</button>

  <!-- ── Footer ── -->
  <footer id="footer">
    <p>Developed with ❤️ by <span>B. M. Shahria Alam</span> · 2025</p>
    <p>Memories of <span>Amra Sobai নষ্ট Gang (Fall 2021)</span> at East West University</p>
    <!-- Visitor Counter -->
  <div id="visitor-counter">
    <span>👁️ Total Visitors: </span>
    <span id="visit-count">...</span>
  </div>
  </footer>

  <!-- Back-to-top + section reveal script (tiny, no extra file needed) -->
  <script>
    // Back to top visibility
    window.addEventListener('scroll', () => {
      const btn = document.getElementById('back-to-top');
      if (btn) btn.classList.toggle('visible', window.scrollY > 500);
    });

    // Section scroll reveal
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('revealed'); revealObserver.unobserve(e.target); } });
    }, { threshold: 0.05 });

    // Observe sections after gallery is shown (called from script.js initGallery)
    const _origInit = window.initGallery;
    document.addEventListener('gallerydone', () => {
      document.querySelectorAll('.semester-section').forEach(s => revealObserver.observe(s));
    });
  </script>

</body>
</html>
